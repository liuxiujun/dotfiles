# # 基础命令和快捷键
# # Session管理
# prefix + d    # 从会话中分离
# prefix + s    # 列出会话
# prefix + $    # 重命名当前会话
# prefix + (    # 移动到上一个会话
# prefix + )    # 移动到下一个会话

# # Window管理
# prefix + c    # 创建新窗口
# prefix + n    # 切换到下一个窗口
# prefix + p    # 切换到上一个窗口
# prefix + 0-9  # 按编号切换窗口
# prefix + ,    # 重命名当前窗口
# prefix + w    # 列出窗口
# prefix + &    # 关闭当前窗口
# prefix + f    # 按名称查找窗口
# prefix + .    # 将窗口移动到不同编号

# # Pane操作
# prefix + h    # 垂直分割窗格
# prefix + v    # 水平分割窗格
# prefix + o    # 切换到下一个窗格
# prefix + x    # 关闭当前窗格
# prefix + {    # 当前窗口向左移动
# prefix + }    # 当前窗口向右移动
# prefix + z    # 窗口最大化/恢复
# prefix + !    # 将Pane转换为Window
# :setw synchronize-panes



# --- 基础设置 ---
# 将默认前缀键 Ctrl-b 改为更易按的 Ctrl-a（可选，但需记住）
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 启用鼠标支持（选择窗格、调整大小、滚动）
set -g mouse on

# 设置 256 色并尝试启用真彩色，以获得更好的主题显示
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 快速重载配置 (prefix + r)
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- 窗格管理 (使用更直观的符号) ---
# 垂直分割 (|) 和水平分割 (-)
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 使用 Alt + hjkl在窗格间直接导航（无需前缀）
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# --- 状态栏美化与信息显示 ---
set -g status-interval 1
set -g status-justify centre
set -g status-style "fg=#665c54"
# 左侧显示会话名和窗口/窗格索引
set -g status-left "#[fg=#ebdbb2,bg=#665c54] #S #[fg=#665c54,bg=#3c3836]#[fg=#ebdbb2,bg=#3c3836] #I:#P "
# 右侧显示时间、日期和主机名
set -g status-right "#[fg=#3c3836,bg=default]#[fg=#ebdbb2,bg=#3c3836] %H:%M %d-%b #[fg=#665c54,bg=#3c3836]#[fg=#ebdbb2,bg=#665c54] #H "

# 窗口列表样式
setw -g window-status-format "#[fg=#928374,bg=default] #I:#W "
setw -g window-status-current-format "#[fg=#ebdbb2,bg=#665c54]#[fg=#28282k,bg=#ebdbb2] #I:#W "

# WezTerm官方文档：
#   users vars 可以跨multiplexer/ssh使用，但经过tmux时，必须用tmux passthrough escape sequence, 并且tmux还要开 set -g allow-passthrough on
set -g allow-passthrough on
