[core]
    # 编辑器路径（假设 neovim 在 PATH 中，否则需写完整路径）
    editor = 'nvim.exe'
    # 启用文件系统缓存，提升性能
    fscache = true

[credential]
    # Windows 推荐使用 Git Credential Manager
    helper = manager-core

[interactive]
    # 使用 Windows 终端样式
    diffFilter = less -R

[merge]
    # Windows 下可使用 WinMerge 等，这里保持默认
    tool = vimdiff

[diff]
    # 使用内置差异工具
    tool = default
