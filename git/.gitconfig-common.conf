[user]
    # 全局用户名和邮箱（可被本地覆盖）
    name = liuxiujun
    email = liuxiujun09@outlook.com

[core]

    # 处理行尾：检出时保留原样，提交时统一为 LF
    # Windows 上如需自动转换可改为 'true'，但推荐 'input'
    autocrlf = input
    # 禁止混合行尾，提交时警告
    safecrlf = warn
    # 默认编辑器（这里以 neovim 为例，其他编辑请自行修改）
    editor = nvim
    # 忽略文件权限变更
    filemode = false
    # 自动处理大小写不敏感的文件系统（如 Windows/macOS）
    ignorecase = true

[alias]
    # 常用命令简写
    co = checkout
    br = branch
    ci = commit
    st = status
    lg = log --oneline --graph --all
    unstage = reset HEAD --
    last = log -1 HEAD
    amend = commit --amend --no-edit
[color]
    # 启用彩色输出
    ui = auto

[push]
    # 推送当前分支时自动设置上游
    default = simple
    autoSetupRemote = true

[init]
    # 初始分支名（Git 2.28+ 推荐改为 main）
    defaultBranch = main

[merge]
    # 使用 vimdiff 作为合并工具（可改为其他）
    tool = vimdiff

[mergetool]
    prompt = false

[diff]
    # 使用外部差异工具（可选）
    tool = default

[grep]
    # grep 时高亮匹配行
    lineNumber = true

[help]
    # 自动纠正命令（拼写错误时提示）
    autocorrect = 10
